<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contatto</title>
<style>
/* Minimal styles, stesso design token del builder */
:root{--pri:#01696f;--pri-h:#0c4e54;--pri-hl:#cedcd8;--bg:#f7f6f2;--surface:#f9f8f5;
  --border:#d4d1ca;--div:#dcd9d5;--txt:#28251d;--muted:#7a7974;--err:#a12c7b;
  --ff:'Inter',system-ui,sans-serif;--fd:'Instrument Serif',Georgia,serif;
  --r:.5rem;--rxl:1rem;--rfull:9999px;
  --sh:0 12px 32px oklch(0.2 0.01 80/.12)}
@media(prefers-color-scheme:dark){:root{
  --bg:#171614;--surface:#1c1b19;--border:#393836;--div:#262523;
  --txt:#cdccca;--muted:#797876;--pri:#4f98a3;--pri-h:#227f8b;--pri-hl:#313b3b}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100dvh;font-family:var(--ff);background:var(--bg);color:var(--txt);
  display:flex;align-items:center;justify-content:center;padding:1rem;line-height:1.6;
  -webkit-font-smoothing:antialiased}
.card{width:100%;max-width:440px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rxl);overflow:hidden;box-shadow:var(--sh)}
.hero{background:linear-gradient(135deg,var(--pri),var(--pri-h));
  padding:2.5rem 2rem 1.5rem;display:flex;flex-direction:column;align-items:center;text-align:center}
.av{width:80px;height:80px;border-radius:var(--rfull);background:rgba(255,255,255,.2);
  border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:2rem;color:#fff;margin-bottom:1rem}
.hero h1{font-family:var(--fd);font-size:1.75rem;font-weight:400;color:#fff;margin-bottom:.25rem}
.hero .role{font-size:.9rem;color:rgba(255,255,255,.75)}
.hero .org{font-size:.8rem;color:rgba(255,255,255,.55);margin-top:2px}
.body{padding:1.25rem 1.5rem}
.row{display:flex;align-items:flex-start;gap:1rem;padding:.75rem 0;border-bottom:1px solid var(--div)}
.row:last-of-type{border-bottom:none}
.ico{width:34px;height:34px;border-radius:var(--r);background:var(--pri-hl);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--pri)}
.ico svg{width:15px;height:15px}
.rc{flex:1;min-width:0}
.rl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.rv{font-size:.875rem;word-break:break-all}
.rv a{color:var(--pri);text-decoration:none}.rv a:hover{text-decoration:underline}
.foot{padding:1.25rem 1.5rem;border-top:1px solid var(--div);display:flex;flex-direction:column;gap:.75rem;align-items:center}
.dl{width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:1rem;background:var(--pri);color:#fff;border-radius:var(--r);
  font-size:.9rem;font-weight:600;border:none;cursor:pointer;transition:background .18s}
.dl:hover{background:var(--pri-h)}
.pw{font-size:.7rem;color:#bab9b4}
.err{background:oklch(from var(--err) l c h/.08);border:1px solid oklch(from var(--err) l c h/.25);
  border-radius:var(--r);padding:1rem;color:var(--err);font-size:.875rem;text-align:center}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"><div class="card"><div class="hero"><div class="av">…</div><h1>Caricamento…</h1></div></div></div>
<script>
(function(){
  const vc=new URLSearchParams(window.location.search).get('vc');
  if(!vc){document.getElementById('root').innerHTML='<div class="err">Nessuna vCard nel link.</div>';return;}
  try{
    const vcStr=decodeURIComponent(escape(atob(vc)));
    const g=f=>{const m=vcStr.match(new RegExp('^'+f+'[^:]*:(.*)$','im'));return m?m[1].trim():'';};
    const ga=f=>[...vcStr.matchAll(new RegExp('^'+f+'[^:]*:(.*)$','gim'))].map(m=>m[1].trim());
    const sc={};[...vcStr.matchAll(/^X-SOCIALPROFILE;TYPE=([^:]+):(.*)$/gim)].forEach(m=>sc[m[1].toLowerCase()]=m[2].trim());
    const n=g('N').split(';'),adr=g('ADR').split(';'),ph=ga('TEL'),em=ga('EMAIL');
    const d={fn:n[1]||'',ln:n[0]||'',dn:g('FN'),tit:g('TITLE'),org:g('ORG').split(';')[0],
      p1:ph[0]||'',p2:ph[1]||'',p3:ph[2]||'',fx:ph[3]||'',
      e1:em[0]||'',e2:em[1]||'',wb:g('URL'),
      st:adr[2]||'',ci:adr[3]||'',re:adr[4]||'',zp:adr[5]||'',co:adr[6]||'',
      li:sc.linkedin||'',tw:sc.twitter||'',ig:sc.instagram||'',gh:sc.github||'',no:g('NOTE')};
    const fname=d.dn||`${d.fn} ${d.ln}`;
    const ini=fname.split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';
    const h=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const PI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.27 19 19.44 19.44 0 0 1 5 12.72 19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
    const EI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`;
    const WI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;
    const MI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
    const LI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
    const NI=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
    const rows=[];
    const row=(ic,lb,val)=>rows.push(`<div class="row"><div class="ico">${ic}</div><div class="rc"><div class="rl">${lb}</div><div class="rv">${val}</div></div></div>`);
    if(d.p1) row(PI,'Telefono',`<a href="tel:${d.p1}">${h(d.p1)}</a>`);
    if(d.p2) row(PI,'Cellulare',`<a href="tel:${d.p2}">${h(d.p2)}</a>`);
    if(d.p3) row(PI,'Tel. 3',`<a href="tel:${d.p3}">${h(d.p3)}</a>`);
    if(d.fx) row(PI,'Fax',h(d.fx));
    if(d.e1) row(EI,'Email',`<a href="mailto:${d.e1}">${h(d.e1)}</a>`);
    if(d.e2) row(EI,'Email 2',`<a href="mailto:${d.e2}">${h(d.e2)}</a>`);
    if(d.wb) row(WI,'Sito web',`<a href="${h(d.wb)}" target="_blank" rel="noopener">${h(d.wb)}</a>`);
    if(d.st||d.ci) row(MI,'Indirizzo',h([d.st,d.ci,d.re,d.zp,d.co].filter(Boolean).join(', ')));
    if(d.li) row(LI,'LinkedIn',`<a href="${h(d.li)}" target="_blank" rel="noopener">LinkedIn ↗</a>`);
    if(d.tw) row(LI,'X/Twitter',`<a href="${h(d.tw)}" target="_blank" rel="noopener">X / Twitter ↗</a>`);
    if(d.ig) row(LI,'Instagram',`<a href="${h(d.ig)}" target="_blank" rel="noopener">Instagram ↗</a>`);
    if(d.gh) row(LI,'GitHub',`<a href="${h(d.gh)}" target="_blank" rel="noopener">GitHub ↗</a>`);
    if(d.no) row(NI,'Note',h(d.no));
    document.getElementById('root').innerHTML=`<div class="card">
      <div class="hero">
        <div class="av">${ini}</div>
        <h1>${h(fname)}</h1>
        ${d.tit?`<div class="role">${h(d.tit)}</div>`:''}
        ${d.org?`<div class="org">${h(d.org)}</div>`:''}
      </div>
      <div class="body">${rows.join('')}</div>
      <div class="foot">
        <button class="dl" id="dlbtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Scarica contatto (.vcf)
        </button>
        <span class="pw">vCard by <a href="https://2mcreations.it" style="color: var(--pri);" target="_blank" rel="noopener">2Mcreations.it</a></span>
      </div>
    </div>`;
    function dl(){
      const blob=new Blob([vcStr],{type:'text/vcard;charset=utf-8'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=fname.replace(/[^a-z0-9\-_]/gi,'-').toLowerCase()+'.vcf';
      a.click();URL.revokeObjectURL(a.href);
    }
    document.getElementById('dlbtn').addEventListener('click',dl);
    setTimeout(dl,500); // auto-download
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="err">Errore lettura vCard: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
